<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Fabricante - Printly</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body data-acesso="ADMIN">

<div class="container mt-4">
    <h2>Editar Fabricante (Maker)</h2>

    <form id="formEditarFabricante">
        <input type="hidden" id="id">
        <input type="hidden" id="usuario_id">

        <div class="mb-3">
            <label for="nome" class="form-label">Nome</label>
            <input type="text" id="nome" class="form-control" required>
        </div>

        <div class="mb-3">
            <label for="email" class="form-label">Email</label>
            <input type="email" id="email" class="form-control" required>
        </div>
        

        <hr> <div class="mb-3">
            <label for="cnpj" class="form-label">CNPJ</label>
            <input type="text" id="cnpj" class="form-control">
        </div>

        <div class="mb-3">
            <label for="telefone_comercial" class="form-label">Telefone Comercial</label>
            <input type="text" id="telefone_comercial" class="form-control">
        </div>

        <div class="mb-3">
            <label for="endereco_empresa" class="form-label">Endereço da Empresa</label>
            <input type="text" id="endereco_empresa" class="form-control">
        </div>

        <div class="mb-3">
            <label for="tipo_perfil" class="form-label">Tipo de Perfil</label>
            <select id="tipo_perfil" class="form-select">
                <option value="MAKER" selected>Fabricante</option>
                <option value="CLIENTE">Usuário</option>
                <option value="ADMIN">Administrador</option>
            </select>
        </div>

        <button type="submit" class="btn btn-primary" id="salvar">Salvar Alterações</button>
        <a href="index.php?rota=admin-usuarios" class="btn btn-secondary">Cancelar</a>
    </form>
</div>

<script src="../app/controllers/usuario/js/verif.js"></script>
<script src="../app/controllers/admin/js/editar_fabricante.js"></script>

</body>
</html>
